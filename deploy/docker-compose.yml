version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: bazi-backend
    restart: always
    env_file: .env
    volumes:
      - backend-data:/app/web/backend/data
    expose:
      - "8000"

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: bazi-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
